<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Turni Capri Blu Sorrento</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <section class="top-card">
      <div>
        <p class="eyebrow">Capri Blu Sorrento</p>
        <h1>Turni Staff</h1>
        <p class="subtitle">Pagina semplice per organizzare i turni settimanali del personale.</p>
      </div>

      <div class="week-box">
        <label for="weekInput">Seleziona settimana</label>
        <input id="weekInput" type="week" />
        <p id="weekRange" class="week-range"></p>
      </div>
    </section>

    <section class="toolbar" aria-label="Strumenti tabella">
      <button id="printBtn" type="button">Stampa</button>
      <button id="resetBtn" type="button">Ripristina esempio</button>
    </section>

    <section class="legend" aria-label="Legenda colori">
      <span><i class="dot pranzo"></i> Pranzo</span>
      <span><i class="dot cena"></i> Sera</span>
      <span><i class="dot spezzato"></i> Spezzato</span>
      <span><i class="dot riposo"></i> Riposo</span>
    </section>

    <section class="table-card">
      <div class="table-scroll">
        <table class="shift-table" id="shiftTable">
          <thead>
            <tr>
              <th>Staff</th>
              <th data-day-header="lunedi">Lunedì</th>
              <th data-day-header="martedi">Martedì</th>
              <th data-day-header="mercoledi">Mercoledì</th>
              <th data-day-header="giovedi">Giovedì</th>
              <th data-day-header="venerdi">Venerdì</th>
              <th data-day-header="sabato">Sabato</th>
              <th data-day-header="domenica">Domenica</th>
            </tr>
          </thead>
          <tbody id="scheduleBody"></tbody>
        </table>
      </div>
    </section>

    <p class="note">Clicca su una cella per modificare pranzo, sera o riposo.</p>
  </main>

  <script src="script.js"></script>
</body>
</html>
