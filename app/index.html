<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#063f7a">
  <title>Capri Blu Turni App</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="app.css?v=1">
</head>
<body>
  <main class="app-shell">
    <header class="app-header dashboard-header">
      <div class="top-toolbar">
        <button id="mainMenuBtn" class="toolbar-pill" type="button">☰ Menu</button>
        <button class="toolbar-pill" type="button">Legenda</button>
        <span class="status-pill">Dati ufficiali caricati</span>
        <span id="saveStatus" class="save-status status-pill">Salvato automaticamente</span>
      </div>
      <div class="title-block">
        <p class="eyebrow">TURNI STAFF</p>
        <h1>Sala Capri Blu Sorrento</h1>
        <p class="subtitle">Possibili variazioni.</p>
      </div>
    </header>

    <section class="week-card">
      <label for="weekInput">Settimana</label>
      <input id="weekInput" type="week">
      <p id="weekRange" class="week-range">-</p>
    </section>

    <nav class="tabs">
      <button class="tab-btn active" type="button" data-view="turni">Turni</button>
      <button class="tab-btn" type="button" data-view="richieste">Richieste</button>
      <button class="tab-btn" type="button" data-view="mensile">Mensile</button>
    </nav>

    <section id="turniView" class="view active-view">
      <div class="section-heading">
        <h2>Turni settimana</h2>
        <span class="zoom-label">Zoom tabella 90%</span>
      </div>
      <button id="copyPreviousWeekBtn" class="action-btn" type="button">Copia settimana precedente</button>
      <button id="sendWeekToMonthlyBtn" class="action-btn secondary-action" type="button">Invia settimana al mensile</button>
      <div id="weeklyMonthlyStatus" class="weekly-monthly-status">Non ancora inviata al mensile.</div>
      <div id="scheduleSections" class="sections-list compact-table"></div>
    </section>

    <section id="richiesteView" class="view">
      <h2>Richieste</h2>
      <div id="requestPanel" class="panel-card">
        <label for="requestPerson">Persona</label>
        <select id="requestPerson" class="form-input"></select>
        <label for="requestType">Tipo richiesta</label>
        <select id="requestType" class="form-input">
          <option>Riposo</option>
          <option>Ferie</option>
          <option>Permesso</option>
          <option>Altro</option>
        </select>
        <label for="requestDate">Giorno</label>
        <input id="requestDate" class="form-input" type="date">
        <label for="requestNote">Nota</label>
        <textarea id="requestNote" class="form-input" rows="3" placeholder="Dettagli richiesta"></textarea>
        <button id="addRequestBtn" class="action-btn" type="button">Aggiungi richiesta</button>
      </div>
      <div id="requestsList" class="requests-list"></div>
    </section>

    <section id="mensileView" class="view">
      <h2>Mensile</h2>
      <div id="monthlySummary" class="panel-card">Riepilogo mensile in preparazione.</div>
    </section>
  </main>

  <div id="shiftEditor" class="shift-editor" aria-hidden="true">
    <div class="shift-editor-card shift-menu-card">
      <div class="shift-menu-head">
        <div>
          <p class="shift-menu-label">Selezione turno</p>
          <p id="shiftEditorTitle" class="shift-editor-title">Turno</p>
        </div>
        <button id="closeShiftEditorBtn" class="menu-close-btn" type="button">×</button>
      </div>
      <div id="shiftOptions" class="shift-options shift-menu-options"></div>
      <div class="custom-shift-zone">
        <label for="customShiftInput">Turno personalizzato</label>
        <input id="customShiftInput" class="custom-shift-input" type="text" placeholder="Es. 12 00-15 / 19 00">
      </div>
      <div class="editor-actions">
        <button id="saveCustomShiftBtn" class="action-btn" type="button">Salva turno scritto</button>
        <button id="clearShiftBtn" class="ghost-btn" type="button">Riposo</button>
      </div>
    </div>
  </div>

  <div id="mainMenuPanel" class="main-menu-panel" aria-hidden="true">
    <div class="main-menu-card">
      <div class="main-menu-head">
        <strong>SETTIMANA E APP</strong>
        <button id="closeMainMenuBtn" class="menu-close-btn" type="button">×</button>
      </div>
      <div class="menu-week-box">
        <span>Settimana</span>
        <strong id="menuWeekLabel">-</strong>
      </div>
      <button class="main-menu-item" type="button" data-menu-view="turni">Settimana</button>
      <button class="main-menu-item" type="button" data-menu-view="richieste">Richieste</button>
      <button class="main-menu-item" type="button" data-menu-view="mensile">Presenze mensili</button>
      <button id="menuSendMonthlyBtn" class="main-menu-item menu-warm-item" type="button">Invia al mensile</button>
      <button id="menuArchiveBtn" class="main-menu-item" type="button">Archivio</button>
      <button id="menuBackupBtn" class="main-menu-item" type="button">Scarica backup locale</button>
      <button id="menuPrintBtn" class="main-menu-item" type="button">Stampa</button>
      <button id="menuMessagesBtn" class="main-menu-item" type="button">Messaggi personale</button>
    </div>
  </div>

  <!-- Ordine script: core app, invio mensile, riepilogo, colori celle, menu alto -->
  <script src="app.js?v=1"></script>
  <script src="weekly-monthly.js?v=1"></script>
  <script src="monthly.js?v=1"></script>
  <script src="theme.js?v=1"></script>
  <script src="menu.js?v=1"></script>
</body>
</html>
