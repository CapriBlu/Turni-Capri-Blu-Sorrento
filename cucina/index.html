<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pagina archiviata - Turni Cucina / Pizzeria</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: #eef6ff;
      color: #12305a;
      padding: 18px;
    }
    .card {
      width: min(560px, 100%);
      padding: 28px;
      border-radius: 24px;
      background: #ffffff;
      border: 1px solid rgba(6, 27, 58, .12);
      box-shadow: 0 18px 42px rgba(6, 27, 58, .10);
      text-align: center;
    }
    h1 { margin: 0 0 10px; color: #073b7a; }
    p { line-height: 1.5; }
    a {
      display: inline-flex;
      margin-top: 14px;
      padding: 12px 18px;
      border-radius: 999px;
      background: #073b7a;
      color: white;
      text-decoration: none;
      font-weight: 900;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Pagina archiviata</h1>
    <p>I turni Cucina, Pizzeria e Lavaggio sono stati spostati nella tabella principale dei turni.</p>
    <p>Usa la pagina principale per modificare Sala, Pizzeria e Cucina/Lavaggio insieme.</p>
    <a href="../">Torna ai turni principali</a>
  </main>
</body>
</html>
