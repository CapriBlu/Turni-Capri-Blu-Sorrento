<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Presenze mensili - Capri Blu</title>
  <link rel="stylesheet" href="style.css?v=13" />
  <link rel="stylesheet" href="monthly-context-menu.css?v=1" />
  <link rel="stylesheet" href="monthly-archive.css?v=3" />
  <link rel="stylesheet" href="presenze-tools-menu.css?v=1" />
</head>
<body>
  <main class="page">
    <section class="top-card">
      <div>
        <p class="eyebrow">Grafico mensile</p>
        <h1>Presenze Staff</h1>
        <p class="subtitle">Sala · Pizzeria · Cucina / Lavaggio</p>
      </div>
      <div class="month-box">
        <label for="monthInput">Mese</label>
        <input id="monthInput" type="month" />
      </div>
    </section>

    <section class="toolbar">
      <a class="link-btn" href="../">Torna ai turni</a>
      <button id="clearBtn" type="button">Svuota</button>
      <span id="autosaveStatus" class="autosave-status">Pronto</span>
      <button id="printBtn" type="button">Stampa</button>
      <button id="resetBtn" type="button">Reset mese</button>
    </section>

    <section class="legend" aria-label="Legenda presenze">
      <div class="legend-item"><span class="p">P</span><b>Presenza</b></div>
      <div class="legend-item"><span class="f">F</span><b>Festa</b></div>
      <div class="legend-item"><span class="fer">Fer</span><b>Ferie</b></div>
      <div class="legend-item"><span class="mal">MAL</span><b>Malattia</b></div>
      <div class="legend-item"><span class="ass">Ass</span><b>Assenza</b></div>
      <div class="legend-item"><span class="rit">P+Rit</span><b>Presenza con ritardo</b></div>
    </section>

    <section class="table-card">
      <div class="table-scroll">
        <table id="presenceTable" class="presence-table"></table>
      </div>
    </section>
  </main>

  <script src="../staff-data.js?v=1"></script>
  <script src="app.js?v=13"></script>
  <script src="monthly-drag-select.js?v=4"></script>
  <script src="monthly-archive.js?v=3"></script>
  <script src="presenze-tools-menu.js?v=1"></script>
</body>
</html>
